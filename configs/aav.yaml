# Training Parameters
training:
  batch_size: 4096
  learning_rate: 0.00226274169
  iteration: 200
  l_exploit: 1
  l_aux: 0.1  

  l_im_intra: 0.01     # 只对分类启用：Agile 原文 IM-on-alpha-assembled
  l_im_gate:  0.01     # 回归可选：IM-on-gating(beta/w)

  im_reduce: "mean"   # "mean" or "sum"
  im_eps: 0.00000001


  lr_gate: 0.001
  lr_expert: 0.002
  
  l_transfer: 0.01        # transfer loss 权重 (建议 0.001 ~ 0.1)
  transfer_cfg:
    sigma_x: 1.0           # 特征 RBF 带宽
    sigma_y: 1.0           # 回归标签核带宽 (分类时不用)
    lambda_disc: 0.1       # HSIC 判别性项权重
directories:
  train: "data/aav/aav_train.tsv"
  validation: "data/aav/aav_val.tsv"
  test: "data/aav/aav_test.tsv"
